site_name: Rondine
site_url: https://rondine.dev/
site_description: Hardware-aware local LLM launcher for Apple Silicon, NVIDIA GPUs, and DGX Spark.
site_author: rondine contributors
repo_name: antonellof/rondine
repo_url: https://github.com/antonellof/rondine
edit_uri: edit/main/docs/
copyright: Apache-2.0. Model weights retain their upstream licenses.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  logo: media/rondine-swallow.png
  favicon: media/rondine-swallow.png
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Install: install.md
  - CLI guide: cli.md
  - Coding clients: coding.md
  - Engine tuning: engine-tuning.md
  - Hardware gates: hardware-gates.md
  - Cluster setup: cluster.md
  - Benchmarks: benchmarks.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/antonellof/rondine
      name: GitHub
  generator: false
