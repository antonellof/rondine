name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync
        run: uv sync --extra dev

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="${TAG#v}"
          PKG_VERSION="$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "tag=${TAG} expected=${EXPECTED} pyproject=${PKG_VERSION} VERSION=${FILE_VERSION}"
          test "${EXPECTED}" = "${PKG_VERSION}"
          test "${EXPECTED}" = "${FILE_VERSION}"

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy src/rondine

      - name: Pytest
        run: uv run pytest -q

      - name: Build distributions
        run: |
          set -euo pipefail
          rm -rf dist
          uv build
          ls -la dist

      - name: Smoke-install wheel
        run: |
          set -euo pipefail
          WHEEL="$(ls dist/rondine-*-py3-none-any.whl | head -n 1)"
          uv tool install --force --python 3.12 "${WHEEL}"
          export PATH="$(uv tool dir --bin):${PATH}"
          rondine --version
          rondine doctor

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum rondine-*-py3-none-any.whl rondine-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          SECTION="${TAG#v}"
          NOTES="$(awk -v section="${SECTION}" '
            BEGIN { in_section=0 }
            /^##[[:space:]]/ {
              if ($0 ~ "^##[[:space:]]+" section "([[:space:]]|$)") { in_section=1; next }
              if (in_section) exit
            }
            in_section { print }
          ' CHANGELOG.md)"
          if [ -z "${NOTES}" ]; then
            NOTES="Rondine ${TAG}"
          fi
          gh release create "${TAG}" \
            --title "Rondine ${TAG}" \
            --notes "${NOTES}" \
            dist/rondine-*-py3-none-any.whl \
            dist/rondine-*.tar.gz \
            dist/SHA256SUMS
