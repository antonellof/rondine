name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check src tests
      - name: Mypy
        run: uv run mypy src/rondine
      - name: Pytest
        run: uv run pytest -q
      - name: CLI diagnostics
        run: |
          uv run rondine doctor
          uv run rondine models
          uv run rondine setup --dry-run
      - name: Dry-run plan and serve
        if: runner.os == 'Linux'
        run: |
          uv run rondine plan qwen2.5-coder-3b --profile coding
          uv run rondine serve qwen2.5-coder-3b --profile coding --dry-run
      - name: Installer syntax checks
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          bash -n install.sh
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck -x install.sh
          else
            sudo apt-get update -qq
            sudo apt-get install -y -qq shellcheck
            shellcheck -x install.sh
          fi
          python3 - <<'PY'
          from pathlib import Path
          text = Path("install.ps1").read_text(encoding="utf-8")
          assert "Install-Rondine" in text
          assert "WSL" in text
          assert "rondine.dev" in text
          print("install.ps1 basic checks OK")
          PY
          test -x install.sh
