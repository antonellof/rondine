# Hardware presets, planner headroom policy, and engine performance templates.
# Templates feed llama-server / mlx_lm.server / vLLM argv for best local throughput.

[catalog]
version = 2

[policy]
# Keep OS / driver / desktop responsive.
os_reserve_gb = 8.0
# Extra fraction of weight size reserved for activations / fragmentation.
activation_margin = 0.12
# Approximate KV-cache GB per token per billion active params (assumes KV quant / GQA).
kv_bytes_per_token_per_b = 0.000006
# Context already budgeted inside vendor min_ram_gb figures.
min_ram_baseline_context = 4096
# Default preferred engines by platform (first available wins for ranking).
apple_engine_order = ["mlx", "llama.cpp"]
spark_engine_order = ["vllm", "llama.cpp"]
linux_engine_order = ["llama.cpp", "vllm"]
default_port = 8080
default_host = "127.0.0.1"

# ---------------------------------------------------------------------------
# Engine performance templates (merged: defaults → profile → target override)
# ---------------------------------------------------------------------------

[engines."llama.cpp".defaults]
n_gpu_layers = 99
flash_attn = true
parallel = 2
batch_size = 512
ubatch_size = 128
# 0 = leave thread count to llama.cpp
threads = 0
cont_batching = true
cache_type_k = "q8_0"
cache_type_v = "q8_0"

[engines."llama.cpp".coding]
parallel = 1
batch_size = 512
ubatch_size = 128

[engines."llama.cpp".chat]
parallel = 4
batch_size = 1024
ubatch_size = 256

[engines."llama.cpp".mac]
# Unified memory: keep KV a bit leaner on Apple Silicon.
cache_type_k = "q4_0"
cache_type_v = "q4_0"

[engines."llama.cpp".spark]
flash_attn = true
parallel = 4
batch_size = 2048
ubatch_size = 512
cache_type_k = "f16"
cache_type_v = "f16"

[engines.mlx.defaults]
# mlx_lm.server takes few knobs; notes carry sampling to clients.
trust_remote_code = true

[engines.mlx.coding]
trust_remote_code = true

[engines.vllm.defaults]
gpu_memory_utilization = 0.90
max_model_len = 32768
enable_prefix_caching = true
enforce_eager = false
tensor_parallel_size = 1
dtype = "auto"

[engines.vllm.coding]
gpu_memory_utilization = 0.90
max_model_len = 32768
enable_prefix_caching = true

[engines.vllm.chat]
gpu_memory_utilization = 0.88
max_model_len = 16384

[engines.vllm.spark]
gpu_memory_utilization = 0.92
max_model_len = 65536
enable_prefix_caching = true
# MoE backend still comes from the model variant (flashinfer_b12x).

# ---------------------------------------------------------------------------
# Hardware targets (matched by platform + RAM band)
# ---------------------------------------------------------------------------

[[targets]]
id = "mac-24"
label = "Apple Silicon 24GB"
platform = "darwin"
arch = "arm64"
min_ram_gb = 20
max_ram_gb = 28
preferred_engine = "mlx"
suggested_models = ["gemma-4-12b", "qwen3.6-27b"]
engine_template = "mac"
notes = "Laptop class — Gemma 4 12B / Qwen 27B at 4-bit."

