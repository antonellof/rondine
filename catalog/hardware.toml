# Hardware presets, planner headroom policy, and engine performance templates.
# Templates feed llama-server / mlx_lm.server / vLLM argv for best local throughput.

[catalog]
version = 2

[policy]
# Keep OS / driver / desktop responsive.
os_reserve_gb = 8.0
# Extra fraction of weight size reserved for activations / fragmentation.
activation_margin = 0.12
# Approximate KV-cache GB per token per billion active params (assumes KV quant / GQA).
kv_bytes_per_token_per_b = 0.000006
# Context already budgeted inside vendor min_ram_gb figures.
min_ram_baseline_context = 4096
# Default preferred engines by platform (first available wins for ranking).
apple_engine_order = ["mlx", "llama.cpp"]
spark_engine_order = ["vllm", "llama.cpp"]
# Discrete NVIDIA (consumer / workstation): GGUF via llama.cpp first; vLLM when VRAM is large.
cuda_engine_order = ["llama.cpp", "vllm"]
linux_engine_order = ["llama.cpp", "vllm"]
default_port = 8080
default_host = "127.0.0.1"
# Smaller reserve when fitting against GPU VRAM (not system RAM).
vram_reserve_gb = 1.5

# ---------------------------------------------------------------------------
# Engine performance templates (merged: defaults → profile → target override)
# ---------------------------------------------------------------------------

[engines."llama.cpp".defaults]
n_gpu_layers = 99
flash_attn = true
parallel = 2
batch_size = 512
ubatch_size = 512
# 0 = leave thread count to llama.cpp
threads = 0
cont_batching = true
cache_type_k = "q8_0"
cache_type_v = "q8_0"
mlock = false
prio = 0

[engines."llama.cpp".coding]
# Single coding client: one slot; ctx budget is not split.
parallel = 1
batch_size = 1024
ubatch_size = 1024

[engines."llama.cpp".chat]
parallel = 4
batch_size = 2048
ubatch_size = 1024

[engines."llama.cpp".mac]
# Apple Silicon consensus: full Metal offload + flash-attn + large ubatch for prefill.
# KV q8_0 ≈ half cache RAM with near-zero quality loss; flash-attn required for KV quant.
flash_attn = true
batch_size = 2048
ubatch_size = 2048
cache_type_k = "q8_0"
cache_type_v = "q8_0"
mlock = true
prio = 2

[engines."llama.cpp"."mac-tight"]
# ≤36GB unified memory with large models — smaller batches to avoid prefill OOM.
flash_attn = true
batch_size = 512
ubatch_size = 512
cache_type_k = "q8_0"
cache_type_v = "q8_0"
mlock = false
prio = 2

[engines."llama.cpp".spark]
flash_attn = true
parallel = 4
batch_size = 2048
ubatch_size = 512
cache_type_k = "f16"
cache_type_v = "f16"
mlock = false

[engines."llama.cpp".cuda]
# Discrete NVIDIA (CUDA): full offload + flash-attn; moderate batches for coding.
flash_attn = true
n_gpu_layers = 99
batch_size = 2048
ubatch_size = 512
cache_type_k = "q8_0"
cache_type_v = "q8_0"
cont_batching = true
mlock = false

[engines."llama.cpp"."cuda-tight"]
# ≤12GB VRAM — keep prefill batches smaller.
flash_attn = true
n_gpu_layers = 99
batch_size = 512
ubatch_size = 256
cache_type_k = "q8_0"
cache_type_v = "q8_0"
mlock = false

[engines.mlx.defaults]
# mlx_lm.server takes few CLI knobs; env drives Metal throughput.
trust_remote_code = true
metal_fast_synch = true

[engines.mlx.coding]
trust_remote_code = true
metal_fast_synch = true

[engines.mlx.mac]
metal_fast_synch = true

[engines.vllm.defaults]
gpu_memory_utilization = 0.90
max_model_len = 32768
enable_prefix_caching = true
enforce_eager = false
tensor_parallel_size = 1
dtype = "auto"

[engines.vllm.coding]
gpu_memory_utilization = 0.90
max_model_len = 32768
enable_prefix_caching = true

[engines.vllm.chat]
gpu_memory_utilization = 0.88
max_model_len = 16384

[engines.vllm.spark]
gpu_memory_utilization = 0.92
max_model_len = 65536
enable_prefix_caching = true
# MoE backend still comes from the model variant (flashinfer_b12x).

[engines.vllm.cuda]
gpu_memory_utilization = 0.90
max_model_len = 32768
enable_prefix_caching = true
tensor_parallel_size = 1

# ---------------------------------------------------------------------------
# Hardware targets (matched by platform + RAM band, or CUDA VRAM band)
# ---------------------------------------------------------------------------

