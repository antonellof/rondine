# Rondine model catalog — reviewed Unsloth / upstream presets.
# Memory figures are approximate weight sizes (GB). Planner adds OS + KV headroom.

[catalog]
version = 1
source = "https://unsloth.ai/docs"

# ---------------------------------------------------------------------------
