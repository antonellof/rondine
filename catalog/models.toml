# ---------------------------------------------------------------------------
# Profiles — sampling + reasoning defaults
# ---------------------------------------------------------------------------

[profiles.coding]
context = 32768
description = "Practical coding context with model-specific sampling."

[profiles.coding."qwen3.6"]
temperature = 0.6
top_p = 0.95
top_k = 20
min_p = 0.0
presence_penalty = 0.0
enable_thinking = true
reasoning_effort = ""
chat_template_kwargs = { enable_thinking = true }

[profiles.coding."gemma-4"]
