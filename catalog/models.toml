# Rondine curated model allowlist + coding presets.
# Hub discovery (`rondine search`) finds additional repos; this file gates defaults.
# Memory figures are approximate weight sizes (GB). Planner adds OS + KV headroom.

[catalog]
version = 2

# ---------------------------------------------------------------------------
# Small coding models (fast smoke tests / low-memory machines)
# ---------------------------------------------------------------------------

